<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Test - Smile Gaming Hub</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #0d1b2a; color: white; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ff6b35; border-radius: 8px; }
        .success { color: #4CAF50; }
        .error { color: #f44336; }
        button { padding: 10px 20px; margin: 5px; background: #ff6b35; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Admin Functionality Test</h1>
    
    <div class="test-section">
        <h3>Firebase Connection Test</h3>
        <div id="firebase-status">Testing...</div>
        <button onclick="testFirebase()">Test Firebase</button>
    </div>
    
    <div class="test-section">
        <h3>DataManager Test</h3>
        <div id="datamanager-status">Testing...</div>
        <button onclick="testDataManager()">Test DataManager</button>
    </div>
    
    <div class="test-section">
        <h3>Admin Access Test</h3>
        <div id="admin-status">Testing...</div>
        <button onclick="testAdminAccess()">Test Admin Access</button>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // Firebase configuration
        var firebaseConfig = {
            apiKey: "AIzaSyCzq1EtuRnLlljXZNNi7i7hNLd8HFfvE9k",
            authDomain: "smile-game-hud-db.firebaseapp.com",
            databaseURL: "https://smile-game-hud-db-default-rtdb.firebaseio.com",
            projectId: "smile-game-hud-db",
            storageBucket: "smile-game-hud-db.firebasestorage.app",
            messagingSenderId: "100113602094",
            appId: "1:100113602094:web:4f76ba6ce230ea61c071bf"
        };
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
    </script>

    <script src="data.js"></script>
    <script>
        function testFirebase() {
            const status = document.getElementById('firebase-status');
            try {
                if (typeof firebase !== 'undefined') {
                    status.innerHTML = '<span class="success">✅ Firebase loaded successfully</span>';
                    
                    // Test database connection
                    if (firebase.database) {
                        const database = firebase.database();
                        status.innerHTML += '<br><span class="success">✅ Firebase Database available</span>';
                    } else {
                        status.innerHTML += '<br><span class="error">❌ Firebase Database not available</span>';
                    }
                } else {
                    status.innerHTML = '<span class="error">❌ Firebase not loaded</span>';
                }
            } catch (error) {
                status.innerHTML = `<span class="error">❌ Firebase error: ${error.message}</span>`;
            }
        }

        function testDataManager() {
            const status = document.getElementById('datamanager-status');
            try {
                if (typeof DataManager !== 'undefined') {
                    status.innerHTML = '<span class="success">✅ DataManager loaded</span>';
                    
                    // Test basic operations
                    const games = DataManager.getGames();
                    status.innerHTML += `<br><span class="success">✅ Games loaded: ${games.length} games</span>`;
                    
                    const users = DataManager.getUsers();
                    status.innerHTML += `<br><span class="success">✅ Users loaded: ${users.length} users</span>`;
                    
                    const theme = DataManager.getTheme();
                    status.innerHTML += `<br><span class="success">✅ Theme loaded: ${JSON.stringify(theme)}</span>`;
                } else {
                    status.innerHTML = '<span class="error">❌ DataManager not loaded</span>';
                }
            } catch (error) {
                status.innerHTML = `<span class="error">❌ DataManager error: ${error.message}</span>`;
            }
        }

        function testAdminAccess() {
            const status = document.getElementById('admin-status');
            try {
                // Test admin password verification
                const testPassword = 'Ciontatenx83';
                if (testPassword === 'Ciontatenx83') {
                    status.innerHTML = '<span class="success">✅ Admin password verification works</span>';
                    
                    // Test session storage
                    sessionStorage.setItem('adminAccessGranted', 'true');
                    const isAdminGranted = sessionStorage.getItem('adminAccessGranted') === 'true';
                    if (isAdminGranted) {
                        status.innerHTML += '<br><span class="success">✅ Session storage works</span>';
                    } else {
                        status.innerHTML += '<br><span class="error">❌ Session storage failed</span>';
                    }
                } else {
                    status.innerHTML = '<span class="error">❌ Admin password verification failed</span>';
                }
            } catch (error) {
                status.innerHTML = `<span class="error">❌ Admin access error: ${error.message}</span>`;
            }
        }

        // Run tests automatically
        window.addEventListener('load', () => {
            testFirebase();
            testDataManager();
            testAdminAccess();
        });
    </script>
</body>
</html>
